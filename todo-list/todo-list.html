<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List</title>
    <link href="./todo-list.css" rel="stylesheet" />
  </head>
  <body>
    <div class="div-top">
      <p class="top-element">Todo List</p>
      <button class="delete-btn remove-btn">Clear All</button>
    </div>

    <div class="todo-input-grid">
      <input placeholder="Todo Name" class="input-btn name-input" />
      <input type="date" class="date-input" />
      <button class="add-btn">Add</button>
    </div>
    <div class="js-div todo-grid"></div>
    <script src="./todo-list.js"></script>
  </body>
</html>
